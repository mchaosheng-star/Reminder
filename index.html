<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Sticker Reminder</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>Sticker Reminder</h1>
      <p class="sub">Plate &amp; city sticker renewals</p>
    </header>

    <div id="vehicles"></div>

    <button type="button" class="ghost add" id="add-vehicle">+ Add vehicle</button>

    <p class="note">Alerts at 30, 14, 7, 1, and 0 days before each date. Your Register ID and PIN are stored only on this device — never uploaded.</p>

    <button type="button" class="primary" id="save-btn">Save &amp; enable reminders</button>
    <button type="button" class="ghost" id="calendar-btn">Add reminders to calendar</button>
    <button type="button" class="install hidden" id="install-btn">Install on phone</button>
    <p class="hint hidden" id="ios-hint">On iPhone: Share → Add to Home Screen</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
